name: process-update

on:
  workflow_dispatch:
    inputs:
      update_json:
        description: "JSON de update do Telegram"
        required: true
        type: string

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install -r requirements.txt

      - name: process update
        env:
          TOKEN_TOTODILE: ${{ secrets.TOKEN_TOTODILE }}
          ID_CENTRAL_TOTODILE: ${{ secrets.ID_CENTRAL_TOTODILE }}
          GITHUB_TOKEN: ${{ github.token }}
          UPDATE_JSON: ${{ inputs.update_json }}
        run: printf '%s' "$UPDATE_JSON" | python -m app.process_update
