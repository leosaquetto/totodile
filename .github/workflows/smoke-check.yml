name: totodile-smoke-check

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install -r requirements.txt

      - name: compile check
        run: python -m compileall app api scripts

      - name: unit tests
        run: python -m unittest discover -s tests

      - name: process update smoke
        run: printf '%s' '{"update_id":1,"message":{"message_id":1,"text":"oi"}}' | python -m app.process_update
