name: open-pr-once

on:
  push:
    branches:
      - copilot/fix-router-tarefas-real

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: create PR against bootstrap-totodile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --repo leosaquetto/totodile \
            --head copilot/fix-router-tarefas-real \
            --base bootstrap-totodile \
            --title "fix: conectar router ao callback real de tarefas" \
            --body "$(cat <<'BODY'
a pr #12 criou `app/callbacks/tarefas_callback.py`

faltava apenas ligar `app/callbacks/router_stub.py` ao callback real

esta pr remove o último uso do stub antigo no fluxo `tarefa_*`
BODY
)" || echo "PR already exists or creation failed"
