name: open-academia-pr

on:
  push:
    branches:
      - copilot/bootstrap-academia-callback

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: create PR against bootstrap-totodile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --repo leosaquetto/totodile \
            --head copilot/bootstrap-academia-callback \
            --base bootstrap-totodile \
            --title "feat: base real de callbacks para academia" \
            --body "- adiciona callback inicial de academia com persistencia em json
- integra academia_* ao router bootstrap
- prepara a evolucao da area de academia no mesmo modelo incremental de tarefas" \
            || echo "PR already exists"
