name: totodile-bot

on:
  schedule:
    # 10:00 UTC = 07:00 em Brasília
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install -r requirements.txt

      - name: run bot
        env:
          TOKEN_TOTODILE: ${{ secrets.TOKEN_TOTODILE }}
          ID_CENTRAL_TOTODILE: ${{ secrets.ID_CENTRAL_TOTODILE }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python -m app.main
